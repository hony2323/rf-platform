name: Agent CI

on:
  push:
    branches: [master, dev]
    tags: ["v*"]
    paths:
      - "agent/**"
      - ".github/workflows/agent-ci.yml"
  pull_request:
    branches: [master, dev]
    paths:
      - "agent/**"
      - ".github/workflows/agent-ci.yml"

defaults:
  run:
    working-directory: agent

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check src/
      - run: ruff format --check src/

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: mypy src/agent

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - run: pytest -m "not integration" --cov=agent --cov-report=term-missing

  doctor:
    name: Doctor (with [sdr] extra)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # libusb-1.0 ships on ubuntu-latest, but install explicitly so this
      # smoke-tests the same environment a fresh user would have.
      - run: sudo apt-get update && sudo apt-get install -y libusb-1.0-0
      - run: pip install -e ".[dev,sdr]"
      # --no-device must exit 0 in CI (no dongle attached) as long as the
      # software stack (libusb + pyrtlsdrlib + rtlsdr import) is healthy.
      - run: rf-agent doctor --no-device

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test, doctor]
    if: startsWith(github.ref, 'refs/tags/v')
    environment: pypi
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install hatch
      - run: hatch build
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: agent/dist
          password: ${{ secrets.PYPI_TOKEN }}
