version: "3.9"

services:
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: rf-server
    restart: unless-stopped
    env_file:
      - .env.production
    volumes:
      - /mnt/data:/mnt/data
    expose:
      - "8000"

  caddy:
    image: caddy:2
    container_name: rf-caddy
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config: